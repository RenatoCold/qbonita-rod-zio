<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QBonita Festa | Atendimento</title>
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 5px solid #333; border-top: 5px solid #d4af37; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>

    <script>
        // Lista das 17 vendedoras
        const vendedoras = [
            "5511950881377", "5511914633120", "5511943344798", "5511969694794", 
            "5511975431235", "5511925605361", "5511916448269", "5511975888151", 
            "5511937470717", "5511933316504", "5511933316682", "5511910349490", 
            "5511980320702", "5511995015242", "5511943318586", "5511932957376", 
            "5511910982867"
        ];

        const mensagem = encodeURIComponent("Olá! Vi o vestido no Instagram e gostaria de mais informações, disponibilidade de tamanhos e valores. Poderia me ajudar?");

        function redirecionar() {
            // A mágica: usa o tempo atual em minutos para definir a vendedora
            // Isso garante que o rodízio mude a cada minuto, de forma estável
            const minutos = Math.floor(Date.now() / 60000);
            const indice = minutos % vendedoras.length;
            
            window.location.replace(`https://wa.me/${vendedoras[indice]}?text=${mensagem}`);
        }

        // Aguarda 2 segundos para dar o charme do carregamento e redireciona
        window.onload = () => setTimeout(redirecionar, 2000);
    </script>
</body>
</html>
