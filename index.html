<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QBonita Festa | Atendimento</title>
    <style>
        body { 
            background-color: #0d0d0d; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .profile-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #d4af37; /* Borda dourada luxo */
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 22px;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: #aaaaaa;
            margin: 0;
        }

        .loader { 
            border: 4px solid #333; 
            border-top: 4px solid #d4af37; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin-top: 20px;
        }

        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="logo.jpg" alt="QBonita Festa" class="logo">
        <h1>QBonita Festa</h1>
        <p class="subtitle">Redirecionando para uma de nossas vendedoras...</p>
    </div>

    <div class="loader"></div>

    <script>
        // Lista das 17 vendedoras
        const vendedoras = [
            "5511950881377", "5511914633120", "5511943344798", "5511969694794", 
            "5511975431235", "5511925605361", "5511916448269", "5511975888151", 
            "5511937470717", "5511933316504", "5511933316682", "5511910349490", 
            "5511980320702", "5511995015242", "5511943318586", "5511932957376", 
            "5511910982867"
        ];

        const mensagem = encodeURIComponent("Olá! Vi o vestido no Instagram e gostaria de mais informações, disponibilidade de tamanhos e valores. Poderia me ajudar?");

        function redirecionar() {
            // Lógica matemática estável por minuto
            const minutos = Math.floor(Date.now() / 60000);
            const indice = minutos % vendedoras.length;
            
            window.location.replace(`https://wa.me/${vendedoras[indice]}?text=${mensagem}`);
        }

        // Carrega a identidade visual e joga pro whats após 2.5 segundos
        window.onload = () => setTimeout(redirecionar, 2500);
    </script>
</body>
</html>
